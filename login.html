<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login Page</title>
  <style>
    body {
      background-color: #fff;
      color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
    }

    .container {
      background-color: #f9f9f9;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 95%;
      max-width: 450px;
    }

    .container h1 {
      font-size: 1.8em;
      margin-bottom: 10px;
    }

    .container p {
      font-size: 1em;
      color: #555;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      background-color: #ddd;
      color: #000;
      cursor: pointer;
      border-radius: 5px 5px 0 0;
      transition: 0.3s;
    }

    .tab.active {
      background-color: #000;
      color: #fff;
      font-weight: bold;
    }

    form {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    form.active {
      display: block;
    }

    input {
      width: 94%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
      background-color: #fff;
      color: #000;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      font-size: 16px;
      background-color: #000;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #333;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Manage Smarter, Learn Better</h1>
    <p>Login to Your Dashboard</p>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('admin')">Admin</div>
      <div class="tab" onclick="switchTab('student')">Student</div>
    </div>

    <form id="adminForm" class="active" onsubmit="submitForm(event, 'admin')">
      <input type="text" id="adminUser" placeholder="Admin Name" required />
      <input type="password" id="adminPass" placeholder="Password" required />
      <button type="submit">Login as Admin</button>
    </form>

    <form id="studentForm" onsubmit="submitForm(event, 'student')">
      <input type="text" id="studentUser" placeholder="Student Username" required />
      <input type="password" id="studentPass" placeholder="Password" required />
      <button type="submit">Login as Student</button>
    </form>
  </div>

  <script>
    // List of 15 student credentials (username/password)
    const studentAccounts = [
      { username: "student1", password: "pass1" },
      { username: "student2", password: "pass2" },
      { username: "student3", password: "pass3" },
      { username: "student4", password: "pass4" },
      { username: "student5", password: "pass5" },
      { username: "student6", password: "pass6" },
      { username: "student7", password: "pass7" },
      { username: "student8", password: "pass8" },
      { username: "student9", password: "pass9" },
      { username: "student10", password: "pass10" },
      { username: "student11", password: "pass11" },
      { username: "student12", password: "pass12" },
      { username: "student13", password: "pass13" },
      { username: "student14", password: "pass14" },
      { username: "student15", password: "pass15" }
    ];

    function switchTab(role) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('form').forEach(form => form.classList.remove('active'));

      document.querySelector(`.tab[onclick="switchTab('${role}')"]`).classList.add('active');
      document.getElementById(`${role}Form`).classList.add('active');
    }

    function submitForm(event, role) {
      event.preventDefault();

      if (role === 'admin') {
        const user = document.getElementById('adminUser').value.trim();
        const pass = document.getElementById('adminPass').value.trim();
        if (user === 'admin' && pass === 'admin123') {
          window.location.href = 'admindash.html'; // admin dashboard page
        } else {
          alert('Invalid admin credentials!');
        }
      } else {
        const user = document.getElementById('studentUser').value.trim();
        const pass = document.getElementById('studentPass').value.trim();

        const student = studentAccounts.find(acc => acc.username === user && acc.password === pass);
        if (student) {
          localStorage.setItem('loggedInStudent', user); // Save logged-in user
          window.location.href = 'studentdash.html'; // student dashboard page
        } else {
          alert('Invalid student credentials!');
        }
      }
    }
  </script>
</body>
</html>
