<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <style>
    body {
      background-color: #ffffff;
      color: #000000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }
    .main-content {
      margin-left: 0;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 20px;
      background-color: #f4f4f4;
      color: #000;
      border-radius: 10px;
      margin-bottom: 30px;
      position: relative;
    }

    .header h1 {
      margin: 0;
    }

    .header p {
      font-size: 18px;
      margin: 10px 0 0;
    }

    .logout-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background-color: #d9534f;
      color: white;
      border: none;
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    .logout-btn:hover {
      background-color: #c9302c;
    }

    .student-list-table {
      width: 100%;
      margin-top: 40px;
      border-collapse: collapse;
      text-align: center;
    }

    .student-list-table th, .student-list-table td {
      padding: 12px;
      border: 1px solid #ddd;
    }

    .student-list-table th {
      background-color: #f1f1f1;
      color: #000;
    }

    .student-list-table td {
      background-color: #fff;
      color: #000;
    }

    .student-list-table td button {
      background-color: #ddd;
      color: black;
      padding: 8px 12px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      margin: 5px;
    }

    .student-list-table td button:hover {
      background-color: #bbb;
    }

    .action-buttons {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .action-buttons button {
      padding: 15px 30px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
    }

    .action-buttons button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="header">
      <h1>Admin Dashboard</h1>
      <p>Manage students, view reports, and monitor performance.</p>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <h2>Student List</h2>
    <table class="student-list-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Marks</th>
          <th>Attendance</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="student-table-body">
        <!-- Rows generated by JS -->
      </tbody>
    </table>

    <div class="action-buttons">
      <button onclick="location.href='register.html'">Register New Student</button>
    </div>
  </div>

  <script>
    function loadStudents() {
      const students = JSON.parse(localStorage.getItem("students")) || [];
      const tbody = document.getElementById("student-table-body");
      tbody.innerHTML = "";

      students.forEach((student, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${student.name}</td>
          <td>${student.marks}</td>
          <td>${student.attendance}</td>
          <td>
            <button onclick="editStudent(this)">Edit</button>
            <button onclick="deleteStudent(${index})">Delete</button>
          </td>
        `;

        tbody.appendChild(row);
      });
    }

    function editStudent(button) {
      const row = button.closest("tr");
      const cells = row.querySelectorAll("td");

      if (button.textContent === "Edit") {
        for (let i = 0; i < 3; i++) {
          const value = cells[i].textContent.replace('%', '');
          cells[i].innerHTML = `<input type="text" value="${value}" />`;
        }
        button.textContent = "Save";
      } else {
        const name = cells[0].querySelector("input").value.trim();
        const marks = cells[1].querySelector("input").value.trim();
        const attendanceValue = cells[2].querySelector("input").value.trim();

        if (!name || !marks || !attendanceValue) {
          alert("Please fill all fields.");
          return;
        }

        const attendance = attendanceValue + "%";

        cells[0].textContent = name;
        cells[1].textContent = marks;
        cells[2].textContent = attendance;
        button.textContent = "Edit";

        const index = Array.from(row.parentNode.children).indexOf(row);
        const students = JSON.parse(localStorage.getItem("students")) || [];
        students[index] = { name, marks, attendance };
        localStorage.setItem("students", JSON.stringify(students));

        alert("Student updated successfully.");
      }
    }

    function deleteStudent(index) {
      if (confirm("Are you sure you want to delete this student?")) {
        const students = JSON.parse(localStorage.getItem("students")) || [];
        students.splice(index, 1);
        localStorage.setItem("students", JSON.stringify(students));
        loadStudents();
        alert("Student deleted successfully.");
      }
    }

    function logout() {
      window.location.href = 'login.html';
    }

    // Load students when page loads
    window.onload = loadStudents;
  </script>
</body>
</html>
